<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" /> <!-- Deep Teal -->
      <stop offset="100%" stop-color="#f43f5e" /> <!-- Vibrant Coral -->
    </linearGradient>
  </defs>
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#primary-grad)" stroke-width="4" opacity="0.8" />
  
  <!-- Sign Language Hand and Voice Wave Icon -->
  <g transform="translate(18, 18) scale(0.65)">
    <!-- Voice waves -->
    <path d="M10 50 A 40 40 0 0 1 90 50" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <path d="M22 50 A 28 28 0 0 1 78 50" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round" />
    <path d="M34 50 A 16 16 0 0 1 66 50" fill="none" stroke="#f43f5e" stroke-width="6" stroke-linecap="round" />
    
    <!-- Shield / Heart center -->
    <path d="M50 42 L38 28 C28 18 45 5 50 18 C55 5 72 18 62 28 Z" fill="url(#primary-grad)" />
  </g>
</svg>
